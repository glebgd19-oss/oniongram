  Полный React-проект — в корне репозитория (npm install && npm run dev).

<style>
:root{ --spec-x:50%; --spec-y:30%; --a1:139 92 246; --a2:34 211 238; }
*{ box-sizing:border-box; margin:0; padding:0; }
html,body{ height:100%; }
body{
  font-family:Inter,-apple-system,"Segoe UI",Roboto,sans-serif;
  background:#07070f; color:#e2e8f0; overflow:hidden;
  -webkit-font-smoothing:antialiased;
}
button{ font:inherit; color:inherit; background:none; border:0; cursor:pointer; }
input{ font:inherit; color:inherit; }

/* Анимированный фон: градиент + дрейфующие неоновые пятна (только transform → 60 FPS) */
.scene{ position:fixed; inset:0; z-index:0;
  background:
    radial-gradient(1200px 800px at 85% -10%, rgba(var(--a1)/.16), transparent 60%),
    radial-gradient(1000px 700px at -10% 110%, rgba(var(--a2)/.12), transparent 60%),
    linear-gradient(160deg,#0b0b16 0%,#07070f 55%,#0a0716 100%); }
.blob{ position:absolute; border-radius:50%; filter:blur(90px); opacity:.55; will-change:transform; }
.blob.v{ width:44vw; height:44vw; left:-8vw; top:-12vw; background:rgba(var(--a1)/.28); animation:drA 26s ease-in-out infinite alternate; }
.blob.c{ width:36vw; height:36vw; right:-6vw; bottom:-10vw; background:rgba(var(--a2)/.22); animation:drB 32s ease-in-out infinite alternate; }
.blob.m{ width:26vw; height:26vw; right:22vw; top:-8vw; background:rgba(217 70 239/.16); animation:drC 38s ease-in-out infinite alternate; }
@keyframes drA{ from{ transform:translate(0,0) scale(1);} to{ transform:translate(9vw,7vh) scale(1.15);} }
@keyframes drB{ from{ transform:translate(0,0) scale(1);} to{ transform:translate(-8vw,-6vh) scale(1.12);} }
@keyframes drC{ from{ transform:translate(0,0);} to{ transform:translate(6vw,9vh);} }

/* Liquid Glass */
.glass{ background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.14);
  -webkit-backdrop-filter:blur(20px) saturate(180%); backdrop-filter:blur(20px) saturate(180%);
  box-shadow:0 18px 40px -18px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.08); }
.glass-strong{ background:rgba(22,22,40,.62); border:1px solid rgba(255,255,255,.15);
  -webkit-backdrop-filter:blur(24px) saturate(180%); backdrop-filter:blur(24px) saturate(180%);
  box-shadow:0 30px 70px -25px rgba(0,0,0,.75), inset 0 1px 0 rgba(255,255,255,.09); }
/* Цветное преломление по краям */
.refract{ position:relative; }
.refract::before{ content:""; position:absolute; inset:0; border-radius:inherit; padding:1px; pointer-events:none;
  background:linear-gradient(130deg, rgba(var(--a1)/.55), rgba(255,255,255,.10) 30%, rgba(255,255,255,.05) 55%, rgba(var(--a2)/.5));
  -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite:xor; mask-composite:exclude; }
/* Блик, следующий за курсором */
.spec::after{ content:""; position:absolute; inset:0; border-radius:inherit; pointer-events:none;
  background:radial-gradient(420px 300px at var(--spec-x) var(--spec-y), rgba(255,255,255,.09), transparent 62%);
  transition:opacity .3s; }

.scroll::-webkit-scrollbar{ width:6px; }
.scroll::-webkit-scrollbar-thumb{ background:rgba(255,255,255,.14); border-radius:3px; }

/* Анимации */
@keyframes rise{ from{ opacity:0; transform:translateY(14px) scale(.98);} to{ opacity:1; transform:none;} }
@keyframes pop{ from{ opacity:0; transform:translateY(26px) scale(.94);} to{ opacity:1; transform:none;} }
@keyframes fade{ from{ opacity:0;} to{ opacity:1;} }
@keyframes drop{ from{ opacity:0; transform:translateY(-22px) scale(.97);} to{ opacity:1; transform:none;} }
.anim-rise{ animation:rise .38s cubic-bezier(.2,.9,.25,1.05) both; }
.anim-pop{ animation:pop .4s cubic-bezier(.2,.9,.25,1.1) both; }
.anim-fade{ animation:fade .25s ease both; }
.anim-drop{ animation:drop .38s cubic-bezier(.2,.9,.25,1.05) both; }
.msg{ animation:rise .38s cubic-bezier(.2,.9,.25,1.05) both; }

/* Статусы */
.dot{ position:absolute; right:-1px; bottom:-1px; width:11px; height:11px; border-radius:50%; border:2px solid #0b0b16; }
.dot.online{ background:#34d399; animation:pulse 2s ease-out infinite; }
.dot.idle{ background:#fbbf24; } .dot.dnd{ background:#f87171; }
.dot.hidden_{ background:#64748b; } .dot.offline{ background:#475569; }
@keyframes pulse{ 0%{ box-shadow:0 0 0 0 rgba(52,211,153,.5);} 70%{ box-shadow:0 0 0 7px rgba(52,211,153,0);} 100%{ box-shadow:0 0 0 0 rgba(52,211,153,0);} }
.tdot{ display:inline-block; width:4px; height:4px; margin:0 1px; border-radius:50%; background:currentColor; animation:typing 1.2s infinite; }
.tdot:nth-child(2){ animation-delay:.15s; } .tdot:nth-child(3){ animation-delay:.3s; }
@keyframes typing{ 0%,60%,100%{ transform:translateY(0); opacity:.4;} 30%{ transform:translateY(-4px); opacity:1;} }
.skeleton{ position:relative; overflow:hidden; background:rgba(255,255,255,.06); border-radius:12px; }
.skeleton::after{ content:""; position:absolute; inset:0; transform:translateX(-100%);
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.09),transparent); animation:shimmer 1.4s infinite; }
@keyframes shimmer{ to{ transform:translateX(100%);} }
.wave i{ display:inline-block; width:2.5px; margin-right:2px; border-radius:2px; background:rgba(255,255,255,.75); animation:wave 1.1s ease-in-out infinite; }
@keyframes wave{ 0%,100%{ transform:scaleY(.45);} 50%{ transform:scaleY(1);} }

.bubble.them{ background:rgba(26,26,43,.92); border-bottom-left-radius:6px; }
.meta{ display:flex; justify-content:flex-end; gap:5px; margin-top:4px; font-size:11px; opacity:.6; }
.chip{ display:inline-flex; align-items:center; gap:4px; padding:3px 9px; border-radius:99px; background:rgba(255,255,255,.1); font-size:12px; cursor:pointer; transition:transform .18s, background .18s; }
.chip:hover{ transform:scale(1.1); background:rgba(var(--a1)/.3); }
.iconbtn{ display:grid; place-items:center; width:42px; height:42px; border-radius:12px; font-size:17px; transition:transform .2s, background .2s; }
.iconbtn:hover{ transform:scale(1.08); background:rgba(255,255,255,.1); }
.grad-btn{ border-radius:12px; background:linear-gradient(135deg,#8b5cf6,#22d3ee); color:#fff; font-weight:600;

.grad-btn:hover{ transform:translateY(-1px) scale(1.02); filter:brightness(1.1); }
.overlay{ position:fixed; inset:0; z-index:50; display:grid; place-items:center; background:rgba(0,0,0,.48); padding:20px; }
.tab-active{ background:linear-gradient(90deg, rgba(var(--a1)/.35), rgba(var(--a2)/.25)); color:#fff !important; }
.label{ font-size:11px; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:#64748b; padding:8px 12px 4px; }
.switch{ position:relative; width:44px; height:24px; border-radius:99px; background:rgba(255,255,255,.1); transition:background .25s; flex-shrink:0; }
.switch.on{ background:rgba(var(--a1)/.7); }
.switch::after{ content:""; position:absolute; top:2px; left:2px; width:20px; height:20px; border-radius:50%; background:#fff; transition:left .25s cubic-bezier(.2,.9,.3,1.2); }
.switch.on::after{ left:22px; }
.srow{ display:flex; align-items:center; justify-content:space-between; gap:16px; padding:12px; border-radius:12px; }
.srow:hover{ background:rgba(255,255,255,.04); }
.muted{ color:#94a3b8; } .dim{ color:#64748b; } .small{ font-size:12px; } .tiny{ font-size:11px; }
.gradtext{ background:linear-gradient(90deg,#a78bfa,#67e8f9); -webkit-background-clip:text; background-clip:text; color:transparent; }
input.field{ width:100%; padding:12px 14px; border-radius:12px; background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.12); outline:none; transition:border-color .2s, box-shadow .2s; }
input.field:focus{ border-color:rgba(var(--a1)/.7); box-shadow:0 0 0 3px rgba(var(--a1)/.18); }
input.bare{ flex:1; min-width:0; background:none; border:0; outline:none; padding:10px 8px; font-size:15px; }
input.bare::placeholder,input.field::placeholder{ color:#64748b; }

@media (prefers-reduced-motion:reduce){ *{ animation-duration:.001s !important; transition-duration:.001s !important; } }
</style>

  const root=document.getElementById("root");
  root.innerHTML = S.authed ? viewApp() : viewAuth();
  const inp=document.getElementById("draft"); if(inp && !S.overlay){ /* не воруем фокус из оверлеев */ }
  const sq=document.getElementById("searchbox"); if(sq){ sq.focus(); sq.setSelectionRange(sq.value.length,sq.value.length); }
  const feed=document.getElementById("feed"); if(feed){ feed.scrollTop=feed.scrollHeight; }
}

  '<div class="glass-strong refract spec anim-pop" style="width:100%;max-width:440px;border-radius:24px;padding:36px">'+
    '<div style="text-align:center;margin-bottom:26px">'+
      '<div style="font-size:44px;margin-bottom:8px">🧅</div>'+
      '<div class="gradtext" style="font-size:26px;font-weight:800">Oniongram</div>'+
      '<div class="muted small" style="margin-top:6px">Анонимный мессенджер · без телефона и email</div>'+
    '</div>'+
    '<div class="glass" style="display:flex;border-radius:12px;padding:4px;margin-bottom:22px">'+
      '<button onclick="setAuthTab(\'login\')" style="flex:1;padding:9px;border-radius:9px" class="'+(reg?"muted":"tab-active")+'">Вход</button>'+
      '<button onclick="setAuthTab(\'register\')" style="flex:1;padding:9px;border-radius:9px" class="'+(reg?"tab-active":"muted")+'">Регистрация</button>'+
    '</div>'+
    '<div style="display:flex;flex-direction:column;gap:12px">'+
      '<input id="a-user" class="field" placeholder="@username (a-z, 0-9, _)" autocomplete="off" />'+
      '<input id="a-pass" class="field" type="password" placeholder="Пароль" oninput="drawStrength(this.value)" />'+
      (reg?'<div id="strength" style="display:flex;gap:5px;height:4px">'+strengthBars(0)+'</div>'+
      '<div class="glass" style="border-radius:12px;padding:12px;display:flex;align-items:center;gap:12px">'+
        '<span class="small muted">🤖 Капча: <b style="color:#e2e8f0">'+S.captcha.q+'</b></span>'+
        '<input id="a-captcha" class="field" style="width:90px;padding:8px 10px;margin-left:auto" placeholder="Ответ" />'+
      '</div>'+
      '<label class="srow" style="cursor:pointer"><span class="small">Двухфакторная защита (опционально)<br><span class="tiny dim">TOTP-код при каждом входе</span></span>'+
        '<span class="switch'+(S.twoFa?" on":"")+'" onclick="S.twoFa=!S.twoFa;render()"></span></label>':'')+
      (S.authError?'<div class="small anim-fade" style="color:#fca5a5">⚠️ '+esc(S.authError)+'</div>':'')+
      '<button class="grad-btn" style="padding:13px;font-size:15px" onclick="submitAuth()">'+(reg?"Создать аккаунт 🧅":"Войти")+'</button>'+
      '<div class="tiny dim" style="text-align:center;line-height:1.6">🔐 Только логин и пароль. Никаких персональных данных,<br>переписка шифруется локально (E2E).</div>'+
      '<div class="tiny dim" style="text-align:center;margin-top:10px;opacity:.65">Oniongram v1.0.0 · Release</div>'+
    '</div>'+
  '</div></div>';
}
function strengthBars(lvl){
  const colors=["#f87171","#fbbf24","#22d3ee","#34d399"]; let s="";
  for(let i=0;i<4;i++){ s+='<span style="flex:1;border-radius:4px;background:'+(i<lvl?colors[lvl-1]:"rgba(255,255,255,.08)")+';transition:background .3s"></span>'; }
  return s;
}
window.drawStrength=function(v){
  let lvl=0; if(v.length>=8)lvl++; if(/[A-ZА-Я]/.test(v)&&/[a-zа-я]/.test(v))lvl++; if(/\d/.test(v))lvl++; if(/[^\wа-яА-Я]/.test(v))lvl++;
  const el=document.getElementById("strength"); if(el){ el.innerHTML=strengthBars(lvl); }
};
window.setAuthTab=function(t){ S.authTab=t; S.authError=""; S.captcha=makeCaptcha(); render(); };
window.submitAuth=function(){
  const u=(document.getElementById("a-user").value||"").replace(/^@/,"").toLowerCase();
  const p=document.getElementById("a-pass").value||"";
  if(!/^[a-z0-9_]{3,20}$/.test(u)){ S.authError="Юзернейм: 3–20 символов, только a-z, 0-9 и _"; return render(); }
  if(p.length<6){ S.authError="Пароль — минимум 6 символов"; return render(); }
  if(S.authTab==="register"){
    const c=document.getElementById("a-captcha").value;
    if(parseInt(c,10)!==S.captcha.ans){ S.authError="Капча не пройдена — попробуйте ещё раз"; S.captcha=makeCaptcha(); return render(); }
  }
  S.authed=true; S.authError=""; render();
};

function msgHtml(m,i,showAuthor,roleBadge){
  const u=USERS[m.a];
  let body="";
  if(m.kind==="photo"){ body+='<div style="width:250px;max-width:100%;height:150px;border-radius:12px;margin-bottom:8px;background:linear-gradient(135deg,hsl('+m.hue+' 60% 35%),hsl('+(m.hue+70)+' 60% 25%))"></div>'; }
  if(m.kind==="file"){ body+='<span style="display:flex;gap:12px;align-items:center;background:rgba(0,0,0,.25);border-radius:12px;padding:10px 12px;margin-bottom:4px"><span style="display:grid;place-items:center;width:36px;height:36px;border-radius:10px;background:rgba(34,211,238,.25)">📄</span><span><span style="display:block;font-size:13px;font-weight:500">'+esc(m.fileName)+'</span><span class="tiny" style="opacity:.7">'+m.fileSize+' · зашифрован</span></span></span>'; }
  if(m.kind==="voice"){ let bars=""; for(let j=0;j<24;j++){ bars+='<i style="height:'+(7+((j*7)%15))+'px;animation-delay:'+(j*0.06)+'s"></i>'; } body+='<span style="display:flex;align-items:center;gap:10px;padding:4px 0"><span style="display:grid;place-items:center;width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.15)">▶</span><span class="wave" style="display:flex;align-items:center;height:22px">'+bars+'</span><span class="tiny" style="opacity:.8">0:'+String(m.secs).padStart(2,"0")+'</span></span>'; }
  if(m.text&&m.kind!=="file"){ body+='<span>'+esc(m.id.startsWith("x")?demoDecrypt(m.text):m.text)+'</span>'; }
  let reacts="";
  if(m.reactions){ reacts='<span style="display:flex;gap:6px;margin-top:7px;flex-wrap:wrap">'+Object.entries(m.reactions).map(function(e){ return '<span class="chip">'+e[0]+' '+e[1]+'</span>'; }).join("")+'</span>'; }
  const meta='<span class="meta">'+(m.enc?'<span title="Зашифровано">🔒</span>':"")+m.time+(m.mine?" ✓✓":"")+'</span>';
  if(showAuthor){
    return '<div class="msg" style="display:flex;gap:12px;padding:6px;border-radius:12px;animation-delay:'+Math.min(i*35,300)+'ms">'+
      '<button style="align-self:flex-start" onclick="openProfile(\''+m.a+'\')">'+avatar(u,36,false)+'</button>'+
      '<div style="min-width:0"><div style="display:flex;align-items:baseline;gap:8px"><span style="font-size:13px;font-weight:600;color:'+(roleBadge?roleBadge.color:"#e2e8f0")+'">'+esc(u.displayName)+'</span>'+
      (roleBadge?'<span class="tiny" style="border-radius:99px;padding:1px 7px;background:'+roleBadge.color+'22;color:'+roleBadge.color+'">'+roleBadge.name+'</span>':"")+
      '<span class="tiny dim">'+m.time+'</span></div><div style="font-size:15px;line-height:1.5;margin-top:2px">'+body+'</div>'+reacts+'</div></div>';
  }
  return '<div class="msg" style="display:flex;align-items:flex-end;gap:10px;'+(m.mine?"flex-direction:row-reverse;":"")+'animation-delay:'+Math.min(i*35,300)+'ms">'+
    (m.mine?"":avatar(u,30,false))+'<div class="bubble '+(m.mine?"me":"them")+'">'+body+meta+reacts+'</div></div>';
}

function viewMain(){
  if(S.loading){ return '<div class="feed" style="border-radius:16px"><div class="skeleton" style="height:56px;margin-bottom:14px"></div><div class="skeleton" style="height:90px;width:55%;margin-bottom:12px"></div><div class="skeleton" style="height:60px;width:40%;margin-left:auto;margin-bottom:12px"></div><div class="skeleton" style="height:80px;width:50%"></div></div>'; }
  if(S.section==="chats") return viewChat();

function viewServer(){
  const sv=SERVERS.find(function(s){ return s.id===S.serverId; });
  const cur=sv.channels.find(function(c){ return c.id===S.serverChannelId; })||sv.channels[0];
  const msgs=(sv.messages[cur.id]||[]);
  const texts=sv.channels.filter(function(c){ return c.type==="text"; }).map(function(c){
    return '<button class="row'+(cur.id===c.id?" active":"")+'" style="padding:8px 10px;font-size:13px" onclick="openServerChannel(\''+c.id+'\')"><span class="dim">#</span> '+esc(c.name)+'</button>';
  }).join("");
  const voices=sv.channels.filter(function(c){ return c.type==="voice"; }).map(function(c){
    let inner='<span style="display:flex;align-items:center;gap:8px">🔊 '+esc(c.name)+(c.voices.length?'<span class="tiny" style="margin-left:auto;background:rgba(52,211,153,.15);color:#6ee7b7;border-radius:99px;padding:2px 7px">'+c.voices.length+' в войсе</span>':"")+'</span>';
    c.voices.forEach(function(uid){ inner+='<span style="display:flex;align-items:center;gap:8px;margin-top:6px;padding-left:22px" class="small muted">'+avatar(USERS[uid],18,false)+' '+esc(USERS[uid].displayName)+'</span>'; });
    return '<div class="row" style="display:block;padding:8px 10px;font-size:13px;color:#94a3b8">'+inner+'</div>';
  }).join("");
  const roleGroups=sv.roles.map(function(role){
    const members=Object.keys(sv.memberRoles).filter(function(uid){ return sv.memberRoles[uid]===role.id; });
    if(!members.length) return "";
    return '<div style="margin-bottom:14px"><p class="tiny" style="font-weight:600;letter-spacing:.08em;text-transform:uppercase;padding:0 8px 4px;color:'+role.color+'">'+role.name+' — '+members.length+'</p>'+
      members.map(function(uid){ const u=USERS[uid]; return '<button class="row" style="padding:6px 8px" onclick="openProfile(\''+uid+'\')">'+avatar(u,28)+'<span style="min-width:0"><span style="display:block;font-size:13px">'+esc(u.displayName)+'</span>'+(u.customStatus?'<span class="tiny dim" style="display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(u.customStatus)+'</span>':"")+'</span></button>'; }).join("")+
      '<p class="tiny dim" style="padding:4px 8px 0;line-height:1.5">Права: '+role.perms.join(", ")+'</p></div>';
  }).join("");
  return '<div style="display:flex;gap:12px;height:100%;min-height:0">'+
    '<aside class="glass refract spec" style="width:230px;flex-shrink:0;border-radius:16px;display:flex;flex-direction:column;overflow:hidden">'+
      '<div style="padding:12px;border-bottom:1px solid rgba(255,255,255,.1)"><p style="font-size:14px;font-weight:600;display:flex;gap:8px;align-items:center"><span style="font-size:18px">'+sv.icon+'</span>'+esc(sv.name)+'</p><p class="tiny muted" style="margin-top:3px">@'+sv.handle+' · '+fmt(sv.members)+' участников</p></div>'+
      '<div class="scroll" style="flex:1;overflow-y:auto;padding:8px"><p class="label">Текстовые</p>'+texts+'<p class="label">Голосовые</p>'+voices+'</div>'+
    '</aside>'+

function viewSearch(){

  if(!q){ body='<p class="small dim" style="text-align:center;padding:26px 12px">Начните вводить — ищем по всему Oniongram.<br><span class="tiny">Подсказка: попробуйте @cipher или «ключ»</span></p>'; }
  else{
    const us=Object.values(USERS).filter(function(u){ return u.id!=="me"&&(u.username.indexOf(q)>=0||u.displayName.toLowerCase().indexOf(q)>=0); });
    const cs=CHANNELS.filter(function(c){ return c.handle.indexOf(q)>=0||c.name.toLowerCase().indexOf(q)>=0; });
    const svs=SERVERS.filter(function(s){ return s.handle.indexOf(q)>=0||s.name.toLowerCase().indexOf(q)>=0; });
    const ms=[];
    CHATS.forEach(function(c){ c.messages.forEach(function(m){ if(m.text&&m.text.toLowerCase().indexOf(q)>=0){ ms.push({ c:c, m:m }); } }); });
    if(us.length){ body+='<p class="label">Пользователи</p>'+us.map(function(u){
      const chat=CHATS.find(function(c){ return c.userId===u.id; });
      return '<div style="display:flex;align-items:center;gap:12px;padding:8px 12px;border-radius:12px" class="srow">'+avatar(u,34)+
        '<button style="flex:1;min-width:0;text-align:left" onclick="'+(chat?('openChat(\''+chat.id+'\')'):'')+'"><span style="display:block;font-size:14px">'+esc(u.displayName)+(u.premium?" ✨":"")+'</span><span class="tiny muted">@'+u.username+'</span></button>'+
        '<button class="glass iconbtn" style="width:36px;height:36px;font-size:14px" onclick="startCall(\''+u.id+'\',false)" title="Позвонить @'+u.username+'">📞</button></div>';
    }).join(""); }
    if(cs.length){ body+='<p class="label">Каналы</p>'+cs.map(function(c){
      return '<button class="row" onclick="openChannelFromSearch(\''+c.id+'\')"><span class="av" style="width:34px;height:34px;font-size:14px;background:rgba(139,92,246,.25)">📡</span><span style="flex:1;min-width:0;text-align:left"><span style="display:block;font-size:14px">'+esc(c.name)+'</span><span class="tiny muted">@'+c.handle+' · '+fmt(c.subs)+'</span></span></button>';
    }).join(""); }
    if(svs.length){ body+='<p class="label">Сервера</p>'+svs.map(function(s){
      return '<button class="row" onclick="openServerFromSearch(\''+s.id+'\')"><span class="av" style="width:34px;height:34px;border-radius:11px;font-size:15px;background:rgba(34,211,238,.2)">'+s.icon+'</span><span style="flex:1;min-width:0;text-align:left"><span style="display:block;font-size:14px">'+esc(s.name)+'</span><span class="tiny muted">@'+s.handle+' · '+fmt(s.members)+' участников</span></span></button>';
    }).join(""); }
    if(ms.length){ body+='<p class="label">Сообщения</p>'+ms.slice(0,5).map(function(x){
      const u=USERS[x.c.userId];
      return '<button class="row" onclick="openChat(\''+x.c.id+'\')">'+avatar(u,34,false)+'<span style="flex:1;min-width:0;text-align:left"><span style="display:block;font-size:14px">'+esc(u.displayName)+'</span><span class="tiny muted" style="display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(x.m.text)+'</span></span><span class="tiny dim">'+x.m.time+'</span></button>';
    }).join(""); }
    if(!us.length&&!cs.length&&!svs.length&&!ms.length){ body='<p class="small dim" style="text-align:center;padding:26px 12px">Ничего не найдено по «'+esc(S.searchQ)+'» 🧅</p>'; }
  }
  return '<div class="overlay anim-fade" style="align-items:start;padding-top:10vh" onclick="closeOverlay()">'+
  '<div class="glass-strong refract spec anim-drop" style="width:100%;max-width:560px;border-radius:18px;overflow:hidden" onclick="event.stopPropagation()">'+
    '<div style="display:flex;align-items:center;gap:12px;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.1)">'+
      '<span>🔍</span><input id="searchbox" class="bare" placeholder="Поиск: @username, каналы, сервера, сообщения…" value="'+esc(S.searchQ)+'" oninput="searchInput(this.value)" />'+
      '<span class="tiny dim" style="background:rgba(255,255,255,.08);border-radius:6px;padding:4px 8px">Esc</span></div>'+
    '<div class="scroll" style="max-height:55vh;overflow-y:auto;padding:8px">'+body+'</div></div></div>';

window.go=function(s){ if(S.section===s&&!S.loading)return; S.section=s; S.loading=true; render(); setTimeout(function(){ S.loading=false; render(); },550); };
window.openChat=function(id){ S.chatId=id; S.section="chats"; S.overlay=null; const c=CHATS.find(function(x){ return x.id===id; }); if(c)c.unread=0; render(); };
window.openChannel=function(id){ S.channelId=id; S.section="channels"; render(); };
window.openChannelFromSearch=function(id){ S.overlay=null; openChannel(id); };
window.openServer=function(id){ S.serverId=id; S.section="servers"; const sv=SERVERS.find(function(x){ return x.id===id; }); S.serverChannelId=sv.channels[0].id; render(); };
window.openServerFromSearch=function(id){ S.overlay=null; openServer(id); };
window.openServerChannel=function(id){ S.serverChannelId=id; render(); };
window.openSettings=function(){ S.overlay="settings"; render(); };
window.setSettingsTab=function(t){ S.settingsTab=t; render(); };
window.togglePref=function(k){ S.prefs[k]=!S.prefs[k]; render(); };
window.unblock=function(b){ S.blocked=S.blocked.filter(function(x){ return x!==b; }); render(); };
window.setAccent=function(a){ S.prefs.accent=a;
  const map={ violet:["139 92 246","34 211 238"], cyan:["34 211 238","139 92 246"], magenta:["217 70 239","139 92 246"] };
  document.documentElement.style.setProperty("--a1",map[a][0]);
  document.documentElement.style.setProperty("--a2",map[a][1]); render(); };
window.doExport=function(){ S.exported=true; render(); setTimeout(function(){ S.exported=false; if(S.overlay==="settings")render(); },2500); };
window.openSearch=function(){ S.overlay="search"; S.searchQ=""; render(); };
window.searchInput=function(v){ S.searchQ=v; render(); };
window.closeOverlay=function(){ if(S.overlay==="call")return endCall(); S.overlay=null; S.profileId=null; render(); };
window.startCall=function(uid,video){ S.overlay="call"; S.callUser=uid; S.callVideo=!!video; S.callSecs=0; S.muted=false; S.camOff=!video;
  if(callTimer)clearInterval(callTimer);
  callTimer=setInterval(function(){ S.callSecs++; const el=document.getElementById("calltimer");
    if(el){ el.textContent=String(Math.floor(S.callSecs/60)).padStart(2,"0")+":"+String(S.callSecs%60).padStart(2,"0"); } },1000);
  render(); };
window.endCall=function(){ if(callTimer){ clearInterval(callTimer); callTimer=null; } S.overlay=null; S.callUser=null; render(); };
window.openProfile=function(uid){ S.overlay="profile"; S.profileId=uid; render(); };
window.sendMsg=function(){
  const inp=document.getElementById("draft"); if(!inp)return;
  const text=inp.value.trim(); if(!text)return;
  const gate=rl.take();
  if(!gate.ok){ S.limitNote="Слишком быстро — антиспам. Подождите "+gate.wait+" с."; render();
    setTimeout(function(){ S.limitNote=""; render(); },2500); return; }
  if(!S.extraMsgs[S.chatId])S.extraMsgs[S.chatId]=[];
  const now=new Date();
  S.extraMsgs[S.chatId].push({ id:"x"+Date.now(), a:"me", kind:"text", text:demoEncrypt(text),
    time:String(now.getHours()).padStart(2,"0")+":"+String(now.getMinutes()).padStart(2,"0"), enc:true, mine:true });
  render();
  const ni=document.getElementById("draft"); if(ni)ni.focus();
};
window.toggleSub=function(){ const ch=CHANNELS.find(function(c){ return c.id===S.channelId; }); ch.subscribed=!ch.subscribed; render(); };
window.reactPost=function(chId,pId,emoji){ const ch=CHANNELS.find(function(c){ return c.id===chId; });
  const p=ch.posts.find(function(x){ return x.id===pId; }); p.reactions[emoji]=(p.reactions[emoji]||0)+1; render(); };

/* Горячие клавиши */
document.addEventListener("keydown",function(e){
  if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==="k"){ e.preventDefault(); if(S.authed){ openSearch(); } }
  else if(e.key==="Escape"&&S.overlay){ closeOverlay(); }
});
/* Specular highlight за курсором (rAF-троттлинг → 60 FPS) */
let rafId=0;
document.addEventListener("pointermove",function(e){
  if(rafId)return;
  const x=(e.clientX/innerWidth*100).toFixed(1)+"%", y=(e.clientY/innerHeight*100).toFixed(1)+"%";
  rafId=requestAnimationFrame(function(){ rafId=0;
    document.documentElement.style.setProperty("--spec-x",x);
    document.documentElement.style.setProperty("--spec-y",y); });
});

render();
</script>
</body>
